# Non-destructive: matches the raw IP only, so the host's other vhosts (matched by domain)
# are untouched. No default_server. Proxies to the leaderboard on localhost:3939.
server {
  listen 80;
  listen [::]:80;
  server_name 43.153.109.3;

  location / {
    proxy_pass http://127.0.0.1:3939;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}
