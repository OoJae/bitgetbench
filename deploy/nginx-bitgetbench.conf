# Non-destructive: matches the raw IP/domain only, so the host's other vhosts (matched by their
# own domains) are untouched. No default_server. The board + read API are served by the Next app
# on :3939; the write API (register, backtest, jobs, verify) is the node service on :3940.

# Rate-limit the write paths. Valid here because sites-enabled files are included in http{}.
limit_req_zone $binary_remote_addr zone=bbwrite:10m rate=30r/m;

server {
  listen 80;
  listen [::]:80;
  server_name __BENCH_SERVER_NAME__;
  client_max_body_size 4m;

  # Write API + verify -> the node service on :3940. Rate-limited; spec backtests run inline so
  # allow a longer read timeout. Read endpoints (/api/runs, /api/run, /api/stats) fall through to
  # the Next app below, so the public board is unchanged.
  location ~ ^/api/(agents|backtest|jobs|verify)(/|$) {
    limit_req zone=bbwrite burst=10 nodelay;
    proxy_pass http://127.0.0.1:3940;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location / {
    proxy_pass http://127.0.0.1:3939;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}
